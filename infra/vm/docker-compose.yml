# Nxcleus control VM (DigitalOcean s-2vcpu-4gb) — always-on address of the product (01 §1–2).
# Runs the FastAPI control plane + SQLite + Caddy. Zero LLM inference here; all inference is on the
# MI300X fleet / Fireworks fallback. Images build linux/amd64 on this VM (native amd64).
services:
  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    platform: linux/amd64
    env_file:
      - ../../.env
    environment:
      - SQLITE_PATH=/data/platform.db
      - DATA_DIR=/data
      - MODEL_MODE=auto        # real backends when reachable, else mock (badged)
      - TRACE_PROMPTS=true     # persist full prompt+response per dispatch (LOCAL-only rows) — matches the default, set explicitly so it can't drift off
      # Public URL — derived from the domain (sslip.io now; swap NXCLEUS_DOMAIN to nxcleus.com later).
      - APP_BASE_URL=https://${NXCLEUS_DOMAIN:-localhost}
      # Login wall (backend auth). Key-only form: value comes from ../../.env (env_file, canonical —
      # same as every other secret) OR from the deploy shell if exported. Unset in both => the entry
      # is dropped (Compose v2+), so it never clobbers the .env value. Never commit real values.
      - AUTH_ADMIN_PASSWORD
      - AUTH_JUDGE_PASSWORD
      - AUTH_SECRET
    volumes:
      - platform-data:/data
      # real seat/model/fleet/rates configs (repo infra/) — cwd is /app, so this is found before
      # the builtin fallback registry. Read-only; the AI engineer owns these files.
      - ../../infra:/app/infra:ro
      # code-exec + process-runtime containers are launched by the api via the host docker socket
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    expose:
      - "8000"

  caddy:
    image: caddy:2
    platform: linux/amd64
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    environment:
      # Auto-HTTPS site list (comma-separated hostnames; deploy.sh composes primary domain + sslip
      # host). Empty/localhost => internal cert; real hostnames => Let's Encrypt per host.
      - NXCLEUS_SITE=${NXCLEUS_SITE:-localhost}
      # Dedicated landing + platform site blocks (deploy.sh composes them from the primary domain).
      - NXCLEUS_LANDING_HOST=${NXCLEUS_LANDING_HOST:-amd.localhost}
      - NXCLEUS_PLATFORM_HOST=${NXCLEUS_PLATFORM_HOST:-amdplatform.localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Frontend static build, served by Caddy at / (built on the Mac — static output is arch-independent).
      - ../../frontend/dist:/srv/www:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped

volumes:
  platform-data:
  caddy-data:
  caddy-config:
