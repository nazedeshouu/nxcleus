# infra/rates.yaml — metering rate card (Nxcleus)
#
# Feeds the quote engine (stage 3) and the exact invoice (stage 7) — docs/specs/10 §3-§5.
# Metering IS the product claim (the "money slide"), so these are REAL numbers.
#
# STATUS: per-token prices CONFIRMED 2026-07-09 from the live price sheets:
#   - Anthropic: claude-fable-5 $10/$50, claude-opus-4-8 $5/$25 per 1M tok (Anthropic model list /
#     claude-api reference, cached 2026-06-24).
#   - Fireworks serverless: glm-5p2 $1.40/$4.40, deepseek-v4-pro $1.74/$3.48 per 1M tok
#     (fireworks.ai/models/fireworks/{glm-5p2,deepseek-v4-pro}, input/output; cached input 0.14).
#   GPU rate is the 8x MI300X droplet shape.
#
# Model ids are KEYS into infra/models.yaml (what the metering layer passes as `model`); each entry
# also documents the raw provider id used on the wire. token_rate(backend, model) resolves the key
# directly, so keys here MUST match the models.yaml keys (glm-52-hosted, deepseek-v4-pro,
# claude-fable-5), not the bare provider ids.

gpu:
  # 8x MI300X droplet = $15.92/hr -> $1.99/GPU-hr. Rounded to 2.00 (spec 10 §3).
  mi300x_hour_usd: 2.00           # per-GPU-hour; local tokens are priced as GPU time (below)

backends:

  # EXTERNAL — the one designed-in non-local seat (planner). SANITIZED egress only.
  anthropic:
    claude-fable-5:               # models.yaml key: claude-fable-5 (wire id: claude-fable-5)
      provider_id: claude-fable-5
      in_per_mtok: 10.00          # Anthropic list price (Fable 5), confirmed 2026-07-09
      out_per_mtok: 50.00
    claude-opus-4-8:              # planner refusal-fallback target (server-side fallback)
      provider_id: claude-opus-4-8
      in_per_mtok: 5.00
      out_per_mtok: 25.00
    default: {in_per_mtok: 10.00, out_per_mtok: 50.00}

  # EXTERNAL — planner flagship + fallback via OpenRouter (2026-07-10/11). SANITIZED egress only.
  openrouter:
    "openai/gpt-5.6-sol":           # models.yaml key: openai/gpt-5.6-sol (wire id: openai/gpt-5.6-sol)
      provider_id: "openai/gpt-5.6-sol"
      in_per_mtok: 5.00             # catalogue-verified 2026-07-10 (OpenRouter)
      out_per_mtok: 30.00           # catalogue-verified 2026-07-10 (OpenRouter)
    "openai/gpt-5.5":               # models.yaml key: openai/gpt-5.5 (wire id: openai/gpt-5.5)
      provider_id: "openai/gpt-5.5"
      in_per_mtok: 5.00             # catalogue-verified 2026-07-11 (OpenRouter)
      out_per_mtok: 30.00           # catalogue-verified 2026-07-11 (OpenRouter)
    default: {in_per_mtok: 5.00, out_per_mtok: 30.00}

  # AMD_HOSTED — availability fallback only (D7), badged. LIVE-VERIFIED ids (fw catalog 2026-07-09).
  fireworks:
    glm-52-hosted:                # wire id: accounts/fireworks/models/glm-5p2
      provider_id: accounts/fireworks/models/glm-5p2
      in_per_mtok: 1.40           # fireworks.ai serverless (GLM 5.2), confirmed 2026-07-09
      out_per_mtok: 4.40
    deepseek-v4-pro:              # wire id: accounts/fireworks/models/deepseek-v4-pro
      provider_id: accounts/fireworks/models/deepseek-v4-pro
      in_per_mtok: 1.74           # fireworks.ai serverless (DeepSeek-V4-Pro), confirmed 2026-07-09
      out_per_mtok: 3.48
    default: {in_per_mtok: 1.40, out_per_mtok: 4.40}   # glm-class fallback for any other fw model

  # LOCAL — self-hosted MI300X. Local tokens are priced as GPU time, not per-token (10 §3).
  local:
    default: {in_per_mtok: 0.0, out_per_mtok: 0.0}

margin: 0.0                       # hackathon: cost passthrough. Product: pricing knob (10 §3).
