# infra/models.yaml — canonical model registry (Nxcleus)
#
# Generated/maintained from docs/specs/11-model-catalog.md §1–§2 (researched + locked
# 2026-07-09). Change protocol (docs/specs/00-INDEX.md): when this file changes, change
# spec 11 in the same commit, and vice-versa.
#
# One entry per SERVABLE model. Seats/pools reference these keys (infra/seats.yaml);
# fleet launch specs reference these keys (infra/fleet.yaml). This file plus the
# assignment table in spec 11 §5 is the canonical answer to "which model runs what,
# where, and when".
#
# Fields:
#   provider   local | fireworks | anthropic  — resolves the backend + zone.
#                 local     -> LOCAL zone (self-hosted MI300X, vLLM/ROCm)
#                 fireworks -> AMD_HOSTED zone (availability fallback only, D7 — badged)
#                 anthropic -> EXTERNAL zone (the one designed-in non-local seat: planner)
#   hf_id      exact HF repo (local) OR provider model id (fireworks/anthropic).
#   serving    vram_gb / precision / context. hosted entries carry {hosted: true, context}.
#   flags      capability vocabulary (spec 02 §7.2), values: strong | ok | weak.
#              Consumed by the pool scheduler's deterministic argmax (02 §7.4, 07 §5.3).
#   evidence   why we believe the flags (benchmarks; spec 11 §3 / §sources).
#   license    SPDX-ish id. All picks MIT or Apache-2.0 (track rule: MIT-compatible).
#   serves     seats/pools this model backs (documentary; the binding lives in seats.yaml).
#   vllm_rocm  serving note for the fleet task (Day-0 support / kernel caveats).

models:

