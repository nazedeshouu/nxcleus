  glm-46:
    provider: local
    hf_id: "zai-org/GLM-4.6"                 # bf16; FP8 variant: zai-org/GLM-4.6-FP8
    serving: {vram_gb: 714, precision: bf16, context: 200000}
    # ^ P2 default = bf16 across ~5 GPUs (dodges the FP8-decode caveat, vLLM #31475).
    #   P3 alternative = FP8 ~357 GB across 3 GPUs, ONLY if the first-boot decode bench
    #   passes (D14). The bf16<->fp8 knob lives in infra/fleet.yaml (node_b_precision).
    flags:
      greenfield-codegen: ok
      refactor-edit: ok
      sql-data: ok
      test-writing: ok
      docs-writing: ok
      extraction: ok
      math: strong
      agentic-tool-use: strong
      long-context: strong          # whole-plan / whole-codebase — the certifier's job
      merge-review: strong          # the brain's core competency
    evidence: "GPQA 82.9 (~Claude-4.5-class); LiveCodeBench v6 ~82.8, AIME'25 ~93.9 [M]; official: competitive w/ Claude Sonnet 4 / DeepSeek-V3.1 [A]; 200K ctx"
    license: mit
    serves: [certifier, conductor, consolidator, "planner (sovereign)"]
    vllm_rocm: "supported 1/2/4/8-GPU (glm4_moe, mature); FP8-decode caveat spec 11 §0"

