name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.24"
          python-version: "3.12"
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Verify lock file
        run: uv lock --check

      - name: Install backend dependencies
        run: uv sync --locked --extra dev

      - name: Lint backend, scripts, and node agent
        run: uv run ruff check . ../scripts ../infra/droplet/node-agent

      - name: Generate company seed databases
        run: uv run python ../scripts/seed.py companies

      - name: Build production image
        run: docker build --file Dockerfile --tag nxcleus/backend:ci .

      - name: Build generated-code executor image
        run: docker build --file Dockerfile.codeexec --tag nxcleus/codeexec:py312 .

      - name: Run mock golden path
        run: uv run python ../scripts/dev_seed.py

      - name: Run backend test suite
        run: uv run pytest

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Run frontend unit tests
        run: npm test

      - name: Build frontend
        run: npm run build
